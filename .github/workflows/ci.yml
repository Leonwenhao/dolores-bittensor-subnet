name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11.15"
  BUILD_VERSION: "1.5.1"
  SETUPTOOLS_VERSION: "83.0.0"
  WHEEL_VERSION: "0.47.0"
  ENGINE_VERSION: 0.2.0rc1
  ENGINE_SOURCE_COMMIT: a832cfac214b946490dc4feeda40e2e4dd94e241
  ENGINE_WHEEL_SHA256: 015f5f9cd047a4c2feabf7760ccb9d3f8ebf72aef65f658154b18ca80b72aeb1
  ENGINE_SDIST_SHA256: 1acd013f76220e5d0c6cfbe63cf075940f03a7f2f0ece83e05837a2cccf29704
  ENGINE_WHEEL_URL: https://github.com/Leonwenhao/dolores-autocurricula/releases/download/v0.2.0-rc.1/dolores_autocurricula-0.2.0rc1-py3-none-any.whl
  ENGINE_SDIST_URL: https://github.com/Leonwenhao/dolores-autocurricula/releases/download/v0.2.0-rc.1/dolores_autocurricula-0.2.0rc1.tar.gz
  ENGINE_WHEEL: /tmp/dolores_autocurricula-0.2.0rc1-py3-none-any.whl
  ENGINE_SDIST: /tmp/dolores_autocurricula-0.2.0rc1.tar.gz
  SUBNET_WHEEL: /tmp/subnet-dist/dolores_bittensor_subnet-0.2.0rc1-py3-none-any.whl
  SUBNET_SDIST: /tmp/subnet-dist/dolores_bittensor_subnet-0.2.0rc1.tar.gz
  SUBNET_WHEEL_SHA256: 97e2dcd6592e94589b8492a1fc8ffaf449f1f11a3878cefca9059ee52cc2f665
  SUBNET_SDIST_SHA256: f358a8801a21beff09b8a6f3f0cf9bc2ea7c3d2fcddd64c5953844f70728bc16
  SOURCE_DATE_EPOCH: "1783869698"
  GOLDEN_PARSER_HASH: fbf1ca8f3b9cad51370332bb1329d03b16306d4828bed9674e1a3d2a2f80a249

jobs:
  full-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Fetch pinned Dolores engine
        run: |
          curl --fail --location --retry 3 \
            --output "$ENGINE_WHEEL" "$ENGINE_WHEEL_URL"
          echo "$ENGINE_WHEEL_SHA256  $ENGINE_WHEEL" | sha256sum --check --strict
      - name: Install validator and development dependencies
        run: |
          python -m pip install "$ENGINE_WHEEL"
          python -m pip install -e ".[dev]"
          python -m pip check
      - name: Lint
        run: ruff check --no-cache .
      - name: Full tests including Docker holdout and signed wire
        env:
          DOLORES_HOLDOUT_SECRET: ci-only-not-a-production-secret
        run: python -m pytest -q -p no:cacheprovider
      - name: Security gates are present
        run: |
          python -m pytest -q -p no:cacheprovider \
            tests/test_bittensor_default_verify.py \
            tests/test_miner_auth_policy.py \
            tests/test_wire_auth.py \
            tests/test_wire_http_smoke.py \
            tests/test_wire_transport_cap.py \
            tests/test_holdout.py \
            tests/test_holdout_docker.py \
            tests/test_validator_state.py \
            tests/test_recurring_process_restart.py \
            tests/test_supervisor_units.py

  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Fetch and verify pinned Dolores engine
        run: |
          curl --fail --location --retry 3 \
            --output "$ENGINE_WHEEL" "$ENGINE_WHEEL_URL"
          curl --fail --location --retry 3 \
            --output "$ENGINE_SDIST" "$ENGINE_SDIST_URL"
          echo "$ENGINE_WHEEL_SHA256  $ENGINE_WHEEL" | sha256sum --check --strict
          echo "$ENGINE_SDIST_SHA256  $ENGINE_SDIST" | sha256sum --check --strict
      - name: Build subnet wheel and source distribution
        run: |
          python -m pip install \
            "build==$BUILD_VERSION" \
            "setuptools==$SETUPTOOLS_VERSION" \
            "wheel==$WHEEL_VERSION"
          rm -rf /tmp/subnet-source-a /tmp/subnet-source-b \
            /tmp/subnet-dist-a /tmp/subnet-dist-b /tmp/subnet-dist
          for copy in a b; do
            source_dir="/tmp/subnet-source-$copy"
            dist_dir="/tmp/subnet-dist-$copy"
            install -d "$source_dir" "$dist_dir"
            git archive "$GITHUB_SHA" | tar --extract --directory "$source_dir"
            python -m build --no-isolation --wheel --sdist \
              --outdir "$dist_dir" "$source_dir"
            python "$source_dir/scripts/normalize_sdist.py" \
              --epoch "$SOURCE_DATE_EPOCH" \
              "$dist_dir/dolores_bittensor_subnet-0.2.0rc1.tar.gz"
          done
          cmp /tmp/subnet-dist-a/dolores_bittensor_subnet-0.2.0rc1-py3-none-any.whl \
            /tmp/subnet-dist-b/dolores_bittensor_subnet-0.2.0rc1-py3-none-any.whl
          cmp /tmp/subnet-dist-a/dolores_bittensor_subnet-0.2.0rc1.tar.gz \
            /tmp/subnet-dist-b/dolores_bittensor_subnet-0.2.0rc1.tar.gz
          install -d /tmp/subnet-dist
          install -m 0644 /tmp/subnet-dist-a/* /tmp/subnet-dist/
          test -f "$SUBNET_WHEEL"
          test -f "$SUBNET_SDIST"
          echo "$SUBNET_WHEEL_SHA256  $SUBNET_WHEEL" | sha256sum --check --strict
          echo "$SUBNET_SDIST_SHA256  $SUBNET_SDIST" | sha256sum --check --strict
          tar --list --gzip --file "$SUBNET_SDIST"
      - name: Assemble and extract the checkout-independent release bundle
        env:
          SUBNET_SOURCE_COMMIT: ${{ github.sha }}
        run: |
          rm -rf /tmp/bundle-smoke
          rm -f /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle.tar.gz \
            /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle-a.tar.gz \
            /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle-b.tar.gz
          python -m pip install "$ENGINE_WHEEL"
          python -m pip install --no-deps "$SUBNET_WHEEL"
          for copy in a b; do
            python scripts/build_release_bundle.py build \
              --version "$ENGINE_VERSION" \
              --source-date-epoch "$SOURCE_DATE_EPOCH" \
              --engine-source-commit "$ENGINE_SOURCE_COMMIT" \
              --subnet-source-commit "$SUBNET_SOURCE_COMMIT" \
              --engine-wheel "$ENGINE_WHEEL" \
              --subnet-wheel "$SUBNET_WHEEL" \
              --subnet-sdist "$SUBNET_SDIST" \
              --fixture-dir examples/tasks/honest_example \
              --output "/tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle-$copy.tar.gz"
          done
          cmp /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle-a.tar.gz \
            /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle-b.tar.gz
          install -m 0644 \
            /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle-a.tar.gz \
            /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle.tar.gz
          python scripts/build_release_bundle.py verify \
            --version "$ENGINE_VERSION" \
            --source-date-epoch "$SOURCE_DATE_EPOCH" \
            --engine-source-commit "$ENGINE_SOURCE_COMMIT" \
            --subnet-source-commit "$SUBNET_SOURCE_COMMIT" \
            --bundle /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle.tar.gz
          sha256sum /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle.tar.gz
          install -d /tmp/bundle-smoke
          tar --extract --gzip \
            --file /tmp/dolores-bittensor-subnet-0.2.0rc1-release-bundle.tar.gz \
            --directory /tmp/bundle-smoke
          test -f /tmp/bundle-smoke/release-bundle/examples/tasks/honest_example/task.yaml
          test -f /tmp/bundle-smoke/release-bundle/SHA256SUMS
          test -f /tmp/bundle-smoke/release-bundle/provenance.json
          cd /tmp/bundle-smoke/release-bundle
          sha256sum --check --strict SHA256SUMS
      - name: Clean miner install and canonical digest smoke
        run: |
          python -m venv /tmp/miner-venv
          /tmp/miner-venv/bin/python -m pip install "$ENGINE_WHEEL"
          /tmp/miner-venv/bin/python -m pip install "$SUBNET_WHEEL"
          /tmp/miner-venv/bin/python -m pip check
          cd /tmp
          /tmp/miner-venv/bin/dolores-miner --help
          /tmp/miner-venv/bin/dolores-miner init --output /tmp/cohort-tasks --seed 17
          /tmp/miner-venv/bin/dolores-miner validate --task-dir /tmp/cohort-tasks
          /tmp/miner-venv/bin/dolores-miner validate \
            --task-dir /tmp/bundle-smoke/release-bundle/examples/tasks/honest_example
          /tmp/miner-venv/bin/python - <<'PY'
          import importlib.util
          import os
          from pathlib import Path

          import dolores
          import dolores_subnet
          from dolores.schemas.task import TaskPackage
          from dolores_subnet.packaging import from_wire, to_wire

          assert dolores.__version__ == "0.2.0rc1"
          assert dolores_subnet.__version__ == "0.2.0rc1"
          for name in ("duckdb", "streamlit", "pyarrow", "hypothesis", "pytest"):
              assert importlib.util.find_spec(name) is None, name
          expected = os.environ["GOLDEN_PARSER_HASH"]
          task = TaskPackage.load(
              Path("/tmp/bundle-smoke/release-bundle/examples/tasks/honest_example")
          )
          wire = to_wire(task)
          assert task.stable_hash() == expected
          assert wire["package_hash"] == expected
          assert from_wire(wire).stable_hash() == expected
          print(f"clean_miner_golden_digest={expected}")
          print("clean_miner_boundary=ok")
          PY
      - name: Clean validator install and canonical digest smoke
        env:
          DOLORES_HOLDOUT_SECRET: ci-only-not-a-production-secret
        run: |
          python -m venv /tmp/validator-venv
          /tmp/validator-venv/bin/python -m pip install "${ENGINE_WHEEL}[validator]"
          /tmp/validator-venv/bin/python -m pip install "${SUBNET_WHEEL}[validator]"
          /tmp/validator-venv/bin/python -m pip check
          cd /tmp
          /tmp/validator-venv/bin/dolores-validator --help
          /tmp/validator-venv/bin/dolores-validator once \
            --submissions /tmp/bundle-smoke/release-bundle/examples/tasks/honest_example \
            --work /tmp/validator-once \
            --epoch 1 \
            --quota 1
          /tmp/validator-venv/bin/python - <<'PY'
          import json
          import importlib.util
          import os
          from pathlib import Path

          from dolores.schemas.task import TaskPackage
          from dolores_subnet.config import Mode, SubnetConfig
          from dolores_subnet.packaging import from_wire, to_wire

          for name in ("duckdb", "hypothesis", "pytest"):
              assert importlib.util.find_spec(name) is not None, name
          expected = os.environ["GOLDEN_PARSER_HASH"]
          task = TaskPackage.load(
              Path("/tmp/bundle-smoke/release-bundle/examples/tasks/honest_example")
          )
          wire = to_wire(task)
          assert task.stable_hash() == expected
          assert wire["package_hash"] == expected
          assert from_wire(wire).stable_hash() == expected
          cfg = SubnetConfig.from_env(mode=Mode.OFFLINE, work_dir="/tmp/validator-once")
          assert cfg.panel_path.is_file(), cfg.panel_path
          assert cfg.panel_path.is_relative_to(Path("/tmp/validator-venv").resolve())
          rows = [
              json.loads(line)
              for line in cfg.submissions_path.read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          assert len(rows) == 1
          assert rows[0]["verification"]["executed"] is True
          assert rows[0]["verification"]["containerized"] is True
          print(f"clean_validator_golden_digest={expected}")
          print(f"clean_validator_panel_asset={cfg.panel_path}")
          PY
      - name: Extract and smoke the source distribution outside the checkout
        run: |
          rm -rf /tmp/subnet-sdist-source /tmp/sdist-venv
          install -d /tmp/subnet-sdist-source
          tar --extract --gzip --file "$SUBNET_SDIST" \
            --directory /tmp/subnet-sdist-source
          test -f /tmp/subnet-sdist-source/dolores_bittensor_subnet-0.2.0rc1/pyproject.toml
          python -m venv /tmp/sdist-venv
          cd /tmp
          /tmp/sdist-venv/bin/python -m pip install "$ENGINE_WHEEL"
          /tmp/sdist-venv/bin/python -m pip install \
            /tmp/subnet-sdist-source/dolores_bittensor_subnet-0.2.0rc1
          /tmp/sdist-venv/bin/python -m pip check
          /tmp/sdist-venv/bin/dolores-miner --help
          /tmp/sdist-venv/bin/python - <<'PY'
          import os
          from pathlib import Path

          import dolores_subnet
          from dolores.schemas.task import TaskPackage
          from dolores_subnet.packaging import from_wire, to_wire

          module_path = Path(dolores_subnet.__file__).resolve()
          assert module_path.is_relative_to(Path("/tmp/sdist-venv").resolve()), module_path
          expected = os.environ["GOLDEN_PARSER_HASH"]
          task = TaskPackage.load(
              Path("/tmp/bundle-smoke/release-bundle/examples/tasks/honest_example")
          )
          wire = to_wire(task)
          assert task.stable_hash() == expected
          assert wire["package_hash"] == expected
          assert from_wire(wire).stable_hash() == expected
          print(f"clean_sdist_golden_digest={expected}")
          print(f"clean_sdist_import={module_path}")
          PY
      - name: Verify packaged systemd unit syntax on Ubuntu
        run: |
          source_root=/tmp/subnet-sdist-source/dolores_bittensor_subnet-0.2.0rc1
          rm -rf /tmp/systemd-verify
          install -d /tmp/systemd-verify
          install -m 0644 \
            "$source_root"/deploy/systemd/dolores-miner.service \
            "$source_root"/deploy/systemd/dolores-validator.service \
            "$source_root"/deploy/systemd/dolores-validator.timer \
            /tmp/systemd-verify/
          sed -i -E \
            's#^(ExecStart(Post)?=)/opt/[^ ]+#\1/bin/true#; s/^User=.*/User=root/; s/^Group=.*/Group=root/; s/^SupplementaryGroups=.*/SupplementaryGroups=root/' \
            /tmp/systemd-verify/*.service
          SYSTEMD_UNIT_PATH=/tmp/systemd-verify:/usr/lib/systemd/system \
            systemd-analyze verify \
              dolores-miner.service \
              dolores-validator.service \
              dolores-validator.timer
          install -d \
            /tmp/systemd-verify/dolores-miner.service.d \
            /tmp/systemd-verify/dolores-validator.service.d
          install -m 0644 \
            "$source_root"/deploy/systemd/dolores-miner-chain-neutral-rehearsal.conf \
            /tmp/systemd-verify/dolores-miner.service.d/90-chain-neutral-rehearsal.conf
          install -m 0644 \
            "$source_root"/deploy/systemd/dolores-validator-chain-neutral-rehearsal.conf \
            /tmp/systemd-verify/dolores-validator.service.d/90-chain-neutral-rehearsal.conf
          sed -i -E \
            's#^(ExecStart(Post)?=)/opt/[^ ]+#\1/bin/true#' \
            /tmp/systemd-verify/*.service.d/*.conf
          SYSTEMD_UNIT_PATH=/tmp/systemd-verify:/usr/lib/systemd/system \
            systemd-analyze verify \
              dolores-miner.service \
              dolores-validator.service \
              dolores-validator.timer
