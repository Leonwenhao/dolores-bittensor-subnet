name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Public smoke tests
        run: |
          python -m pytest -q \
            tests/test_config.py \
            tests/test_protocol.py \
            tests/test_scoring_weights.py \
            tests/test_wire.py
