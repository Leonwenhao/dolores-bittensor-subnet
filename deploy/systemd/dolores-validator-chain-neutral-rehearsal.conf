# Disposable chain-neutral release rehearsal only.
# Manual endpoints are not metagraph or cohort evidence.
[Service]
EnvironmentFile=/etc/dolores/rehearsal.env
ExecStart=
ExecStart=/opt/dolores-validator/venv/bin/dolores-validator tick --mode wire --work /var/lib/dolores-validator --quota ${DOLORES_VALIDATOR_QUOTA} --timeout ${DOLORES_VALIDATOR_TIMEOUT} --miner-endpoints ${DOLORES_REHEARSAL_MINER_ENDPOINT} --wallet.name ${BT_WALLET_NAME} --wallet.hotkey ${BT_WALLET_HOTKEY} --chain off --panel-mode mock
ExecStartPost=
ExecStartPost=/opt/dolores-validator/venv/bin/dolores-validator health --mode wire --work /var/lib/dolores-validator --miner-endpoints ${DOLORES_REHEARSAL_MINER_ENDPOINT} --wallet.name ${BT_WALLET_NAME} --wallet.hotkey ${BT_WALLET_HOTKEY} --chain off --timeout ${DOLORES_VALIDATOR_TIMEOUT}
